<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Progresso do Aluno</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 30px;
      background-color: #000066;
      color: #5d82ff;
      font-family: 'Orbitron', sans-serif;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      margin-bottom: 40px;
    }

    .modulo {
      margin-bottom: 30px;
    }

    .modulo-label {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .progress-bar {
      background-color: #2a2a80;
      border-radius: 20px;
      overflow: hidden;
      height: 25px;
      max-width: 600px;
      margin-bottom: 10px;
    }

    .progress-fill {
      background-color: #00ccff;
      height: 100%;
      width: 0%;
      transition: width 0.5s ease;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <h1>Progresso do Aluno</h1>

  <div class="container">

    <!-- Módulos com barras de progresso -->
    <div class="modulo">
      <div class="modulo-label">Módulo 1</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>
    </div>

    <div class="modulo">
      <div class="modulo-label">Módulo 2</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 80%;"></div></div>
    </div>

    <div class="modulo">
      <div class="modulo-label">Módulo 3</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 60%;"></div></div>
    </div>

    <div class="modulo">
      <div class="modulo-label">Módulo 4</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 40%;"></div></div>
    </div>

    <div class="modulo">
      <div class="modulo-label">Módulo 5</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 20%;"></div></div>
    </div>

    <div class="modulo">
      <div class="modulo-label">Módulo 6</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 0%;"></div></div>
    </div>

    <div class="modulo">
      <div class="modulo-label">Módulo 7</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 0%;"></div></div>
    </div>

    <div class="modulo">
      <div class="modulo-label">Módulo 8</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 0%;"></div></div>
    </div>

    <div class="modulo">
      <div class="modulo-label">Módulo 9</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 0%;"></div></div>
    </div>

    <div class="modulo">
      <div class="modulo-label">Módulo 10</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 0%;"></div></div>
    </div>

  </div>

</body>
</html>
